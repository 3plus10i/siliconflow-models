name: Daily Crawl

on:
  schedule:
    - cron: '0 5 * * *'          # UTC 05:00 = 北京时间 13:00
  workflow_dispatch:               # 手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/crawl.py

      - name: Commit & Push (仅 CSV 变化时触发)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/siliconflow_models.csv
          if git diff --cached --quiet; then
            echo "数据源无变化，跳过 commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git add public/data/
            git commit -m "data: daily update $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy-pages.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
